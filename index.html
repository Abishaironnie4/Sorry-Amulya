<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>For Amulya</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #fbf6ee;         /* warm cream */
  --ink: #5a5145;        /* soft brown ink */
  --pill: #c98a9c;       /* dusty rose */
  --pill-d: #a86b7d;     /* deeper rose for shadow/accents */
  --ring: #6b5c4b;       /* soft brown border */
  --white: #fff;
  --paper-line: #ecdfd0;
}

* {
  box-sizing: border-box
}

html, body {
  height: 100%;
  margin: 0;
  overflow: hidden;
}

body {
  background:
    radial-gradient(circle at 15% 20%, #ffe3ea 0%, transparent 40%),
    radial-gradient(circle at 85% 15%, #e3f0e0 0%, transparent 45%),
    radial-gradient(circle at 50% 95%, #fff2d9 0%, transparent 50%),
    var(--bg);
  font-family: 'Quicksand', system-ui;
  color: var(--ink);
}

.wrap {
  position: relative;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}

/* 🌸 Layout - Main Apology split screen */
.stage {
  position: relative;
  width: min(1100px, 92vw);
  height: min(600px, 88vh);
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 40px;
  background: #fffaf3;
  border: 2px solid var(--pill-d);
  border-radius: 24px;
  padding: 40px;
  box-shadow: 0 2px 0 #fff, 0 5px 0 var(--paper-line), 0 20px 50px rgba(0,0,0,0.08);
  transform: rotate(-0.35deg);
}

/* Left Column: Letter Title & Body */
.left-letter {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 12px;
  overflow: hidden;
  position: relative;
}

.left-letter h2 {
  margin: 0;
  font-family: 'Great Vibes', cursive;
  font-weight: 400;
  font-size: clamp(30px, 4.2vw, 46px);
  color: var(--pill-d);
  line-height: 1.2;
  padding-right: 40px;
}

.left-letter p {
  margin: 0;
  font-size: clamp(15px, 2vw, 18px);
  font-weight: 600;
  line-height: 28px;
  white-space: pre-wrap;
  overflow-y: auto;
  padding-right: 10px;
  color: #4a4335;
  background-image: repeating-linear-gradient(to bottom, transparent, transparent 27px, var(--paper-line) 28px);
  background-position: 0 4px;
}

.signature {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(26px, 3.2vw, 34px);
  color: var(--pill-d);
  text-align: right;
  margin-top: 4px;
  opacity: 0;
  transition: opacity .8s ease;
}
.signature.show { opacity: 1; }

/* Replay button */
.replayBtn {
  position: absolute;
  top: 0;
  right: 0;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid var(--pill-d);
  color: var(--pill-d);
  display: grid;
  place-items: center;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 4px 0 rgba(0,0,0,0.05);
}

/* Right Column: photo gallery */
.right-picture {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

.avatarFrame {
  position: relative;
  width: min(320px, 100%);
}

.avatar {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 50%;
  overflow: hidden;
  background: #ecdfd0 center/cover no-repeat;
  border: 6px solid var(--pill);
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.nav-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.9);
  border: 2px solid var(--pill-d);
  color: var(--pill-d);
  border-radius: 50%;
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  font-size: 20px;
  font-weight: 900;
  cursor: pointer;
  z-index: 5;
  box-shadow: 0 4px 0 rgba(0,0,0,0.06);
  transition: transform .1s ease;
}
.nav-arrow:active { transform: translateY(-50%) scale(0.94); }
.nav-arrow:disabled { opacity: .35; cursor: default; }
#prevBtn { left: -14px; }
#nextBtn { right: -14px; }

.nameTag {
  margin-top: 20px;
  padding: 10px 24px;
  border-radius: 999px;
  background: var(--pill);
  color: #fff;
  border: 2px solid var(--pill-d);
  font-family: 'Quicksand';
  font-weight: 700;
  box-shadow: 0 6px 0 rgba(0,0,0,0.05);
}

/* ✨ Immersive Falling & Floating Layer */
#sparkLayer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

.falling-emoji {
  position: absolute;
  top: -50px;
  pointer-events: none;
  user-select: none;
  animation: fall linear forwards;
}

@keyframes fall {
  0% {
    transform: translateY(0) translateX(0) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 0.8;
  }
  90% {
    opacity: 0.8;
  }
  100% {
    transform: translateY(105vh) translateX(var(--sway)) rotate(var(--rotation));
    opacity: 0;
  }
}

/* 🚪 Front Door: Premium Frosted Glass look */
.gate {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;
  background: transparent;
}

.gateInner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

.titleCard {
  background: rgba(255, 253, 250, 0.75);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 32px;
  padding: 48px 64px;
  text-align: center;
  box-shadow: 
    0 4px 30px rgba(0, 0, 0, 0.03),
    0 20px 50px rgba(168, 107, 125, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.6);
  position: relative;
}

/* Subtle pulse glow around the entry card */
.titleCard::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 34px;
  background: linear-gradient(45deg, #ffe3ea, #fff2d9, #e3f0e0, #ffe3ea);
  z-index: -1;
  opacity: 0.6;
  filter: blur(6px);
}

.cardLabel {
  margin: 0;
  font-family: 'Quicksand', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #baae9c;
}

.cardTitle {
  margin: 8px 0 0;
  font-family: 'Great Vibes', cursive;
  font-weight: 400;
  font-size: clamp(44px, 7vw, 64px);
  color: var(--pill-d);
  text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
}

.cardIcons {
  margin-top: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  font-size: 28px;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.06));
}

.nameInput {
  padding: 16px 24px;
  border-radius: 24px;
  border: 2px solid var(--pill-d);
  font-family: 'Quicksand';
  font-weight: 700;
  text-align: center;
  font-size: 16px;
  width: min(320px, 85vw);
  background: rgba(255, 255, 255, 0.9);
  box-shadow: 
    0 10px 25px rgba(168, 107, 125, 0.08),
    inset 0 2px 4px rgba(0,0,0,0.03);
  outline: none;
  transition: all 0.3s ease;
}

.nameInput:focus {
  background: #fff;
  box-shadow: 
    0 10px 30px rgba(168, 107, 125, 0.15),
    inset 0 1px 2px rgba(0,0,0,0.02);
  transform: translateY(-1px);
}

.nameInput.wrong {
  border-color: #e0a6a6;
  animation: shake .4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0) }
  25% { transform: translateX(-6px) }
  75% { transform: translateX(6px) }
}

/* 📱 Mobile Styling */
@media (max-width: 700px) {
  .stage {
    grid-template-columns: 1fr;
    height: auto;
    max-height: 92vh;
    overflow-y: auto;
    padding: 26px 22px;
    gap: 22px;
    transform: none;
  }
  .right-picture { order: -1; }
  .avatarFrame { width: min(220px, 65vw); margin: 0 auto; }
  #prevBtn { left: -8px; }
  #nextBtn { right: -8px; }
  .titleCard { padding: 36px 32px; }
}
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gateInner">
    <div class="titleCard">
      <p class="cardLabel">A Garden Letter</p>
      <h1 class="cardTitle">For Amulya</h1>
      <div class="cardIcons" id="cardIcons">🦋 🌸 👸 🌷</div>
    </div>

    <input class="nameInput" id="nameInput" type="password" placeholder="Type password here..." autocomplete="off" />
  </div>
</div>

<div class="wrap">
  <div class="stage" id="scene" style="display:none;">

    <div class="left-letter">
      <button class="replayBtn" id="replayBtn" title="Read again">↻</button>
      <h2 id="typeTitle"></h2>
      <p id="typeBody"></p>
      <p class="signature" id="signature">— with love, always</p>
    </div>

    <div class="right-picture">
      <div class="avatarFrame">
        <button class="nav-arrow" id="prevBtn">❮</button>
        <div class="avatar" id="avatar">
          <img id="avatarImg" src="" alt="Amulya" onerror="this.src='https://placehold.co/360x360/c98a9c/ffffff?text=%F0%9F%8C%B8'">
        </div>
        <button class="nav-arrow" id="nextBtn">❯</button>
      </div>
      <div class="nameTag">Amulya 👸</div>
    </div>

  </div>
</div>

<div id="sparkLayer"></div>

<audio id="bgm" src="sorry-song.mp3" loop></audio>

<script>
const CONFIG = {
  unlockWord: "Nidramabbuamalaya", 

  staticTitle: "🌸 For my sister / friend... I miss you deeply. 🌸",
  staticBody:
`I am writing this because finding the right words out loud has been hard, but I couldn't let another day pass without trying to fix what I broke.

I want to say I am incredibly, truly sorry for [WHAT I DID]. I know it hurt you, and I take full responsibility for it — not the situation, not a misunderstanding, just me.

Our friendship means the world to me. You have been my safe space, my partner in crime, and a piece of my life I never want to lose.

I don't expect everything to go back to normal instantly, and I entirely respect your space. But I wanted you to know I mean this, I miss you, and whenever you're ready... I'll be right here. 🌷`,

  galleryItems: [
    "bestie.png",
    "pic2.jpg",
    "pic3.jpg"
  ],

  spawnIntervalMs: 250, // how often a new object falls down (lower = more dense)
  sparkSet: ["✨", "🦋", "👸", "🌟", "💫", "🌸", "🌷", "👑", "🌼", "💕"]
};

/* ===== Typewriter Function ===== */
let activeTypers = new WeakMap();
function typewrite(el, text, speed=28, done){
  if (activeTypers.has(el)) clearInterval(activeTypers.get(el));
  el.textContent=''; let i=0;
  const t=setInterval(()=>{ el.textContent+= text[i++] || ''; if(i>text.length){clearInterval(t); activeTypers.delete(el); done&&done();}}, speed);
  activeTypers.set(el, t);
}

/* ===== Elegant Falling Garden System ===== */
const sparkLayer = document.getElementById('sparkLayer');

function createFallingEmoji(customX = null, customY = null, isExplosion = false) {
  const el = document.createElement('div');
  el.className = 'falling-emoji';
  el.textContent = CONFIG.sparkSet[Math.floor(Math.random() * CONFIG.sparkSet.length)];
  
  // Randomizing sizing & depths
  const scale = 0.5 + Math.random() * 1.2;
  const size = (16 + Math.random() * 16) * scale;
  el.style.fontSize = `${size}px`;
  
  // Swaying physics variables
  const swayRange = (40 + Math.random() * 80) * (Math.random() > 0.5 ? 1 : -1);
  const totalRotation = (90 + Math.random() * 180) * (Math.random() > 0.5 ? 1 : -1);
  el.style.setProperty('--sway', `${swayRange}px`);
  el.style.setProperty('--rotation', `${totalRotation}deg`);
  
  // Speed variations
  const duration = isExplosion ? (0.6 + Math.random() * 0.8) : (4 + Math.random() * 4);
  el.style.animationDuration = `${duration}s`;

  if (isExplosion) {
    // Blast outwards path logic
    el.style.left = `${customX}px`;
    el.style.top = `${customY}px`;
    el.style.transform = 'translate(-50%, -50%)';
    
    // Custom explosive keyframe injection
    const targetX = (Math.random() - 0.5) * window.innerWidth * 0.8;
    const targetY = (Math.random() - 0.5) * window.innerHeight * 0.8;
    
    el.style.animate([
      { transform: 'translate(-50%, -50%) scale(0) rotate(0deg)', opacity: 1 },
      { transform: `translate(calc(-50% + ${targetX}px), calc(-50% + ${targetY}px)) scale(${scale}) rotate(${totalRotation}deg)`, opacity: 0 }
    ], {
      duration: duration * 1000,
      easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)',
      fill: 'forwards'
    });
  } else {
    // Normal vertical falling layout
    el.style.left = `${customX !== null ? customX : Math.random() * 100}%`;
  }
  
  sparkLayer.appendChild(el);
  setTimeout(() => el.remove(), duration * 1000);
}

// Continuous natural generation loop running instantly
setInterval(() => {
  createFallingEmoji();
}, CONFIG.spawnIntervalMs);

/* ===== Sparkle Explosion on Unlock ===== */
function triggerUnlockExplosion() {
  const centerX = window.innerWidth / 2;
  const centerY = window.innerHeight / 2;
  for (let i = 0; i < 40; i++) {
    createFallingEmoji(centerX, centerY, true);
  }
}

/* ===== Mouse Interaction (Interactive Trails) ===== */
let lastMove = 0;
window.addEventListener('mousemove', (e) => {
  const now = Date.now();
  if (now - lastMove < 120) return; // limit frequency to look cleaner
  lastMove = now;
  // drop an extra item near user cursor coordinates natively
  const percentageX = (e.clientX / window.innerWidth) * 100;
  createFallingEmoji(percentageX, -10);
});

/* ===== Photo Gallery ===== */
const avatarImg = document.getElementById('avatarImg');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
let currentSlide = 0;

function updateGallery(index){
  avatarImg.src = CONFIG.galleryItems[index];
  prevBtn.disabled = index === 0;
  nextBtn.disabled = index === CONFIG.galleryItems.length - 1;
}
prevBtn.addEventListener('click', ()=>{ if(currentSlide>0){ currentSlide--; updateGallery(currentSlide); } });
nextBtn.addEventListener('click', ()=>{ if(currentSlide<CONFIG.galleryItems.length-1){ currentSlide++; updateGallery(currentSlide); } });

/* ===== Letter sequence ===== */
const typeTitle = document.getElementById('typeTitle');
const typeBody = document.getElementById('typeBody');
const signature = document.getElementById('signature');

function playLetter(){
  signature.classList.remove('show');
  typewrite(typeTitle, CONFIG.staticTitle, 40, () => {
    typewrite(typeBody, CONFIG.staticBody, 22, () => {
      signature.classList.add('show');
    });
  });
}

document.getElementById('replayBtn').addEventListener('click', playLetter);

/* ===== Password Gate Logic Handler ===== */
const gate = document.getElementById('gate');
const nameInput = document.getElementById('nameInput');
const bgm = document.getElementById('bgm');
const scene = document.getElementById('scene');

nameInput.addEventListener('keydown', (e)=>{
  if(e.key !== "Enter") return;
  const v = (nameInput.value || '').trim().toLowerCase();

  if(v === CONFIG.unlockWord.toLowerCase()){
    nameInput.disabled = true;
    updateGallery(currentSlide);

    bgm.play().catch(err => console.log("Audio play gesture required"));
    
    // Pop celebration sparkles from the center layout
    triggerUnlockExplosion();

    gate.style.transition = "all .6s cubic-bezier(0.4, 0, 0.2, 1)";
    gate.style.opacity = 0;
    gate.style.transform = "scale(0.95)";

    setTimeout(()=>{
      gate.style.display = "none";
      scene.style.display = "grid";
      playLetter();
    }, 600);

  } else {
    nameInput.classList.remove('wrong');
    void nameInput.offsetWidth; 
    nameInput.classList.add('wrong');
    nameInput.value = "";
  }
});
</script>
</body>
</html>
