<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>For Amulya</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@700;800&family=Poppins:wght@600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f5f2eb;       /* Soft warm parchment cream */
  --grid: #e6e1d5;     /* Muted grid lines */
  --ink: #2b2b2b;
  --pill: #a3b19b;     /* Healing sage/eucalyptus green */
  --pill-d: #84937c;   /* Shadow for accents */
  --ring: #3d443a;     
  --white: #fff;
}

* {
  box-sizing: border-box
}

html, body {
  height: 100%;
  margin: 0
}

body {
  background: var(--bg);
  font-family: 'Nunito', system-ui;
  color: var(--ink);
  overflow: hidden
}

.grid {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(to right, var(--grid) 1px, transparent 1px) 0 0/40px 40px,
    linear-gradient(to bottom, var(--grid) 1px, transparent 1px) 0 0/40px 40px;
  opacity: .75
}

.wrap {
  position: relative;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center
}

/* 💻 Layout - Main Apology split screen */
.stage {
  position: relative;
  width: min(1100px, 92vw);
  height: min(600px, 85vh);
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 40px;
  background: #fdfbf7;
  border: 4px solid var(--ink);
  border-radius: 24px;
  padding: 40px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.06);
}

/* Left Column: Letter Title & Body text typing container */
.left-letter {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 16px;
  overflow: hidden;
}

.left-letter h2 {
  margin: 0;
  font-family: 'Baloo 2';
  font-size: clamp(24px, 3.5vw, 36px);
  color: var(--ring);
  line-height: 1.2;
}

.left-letter p {
  margin: 0;
  font-size: clamp(15px, 2vw, 18px);
  line-height: 1.65;
  white-space: pre-wrap;
  overflow-y: auto;
  padding-right: 10px;
  color: #3d3d3d;
}

/* Right Column: Avatar picture framing */
.right-picture {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

.avatar {
  width: min(320px, 100%);
  aspect-ratio: 1 / 1;
  border-radius: 20px;
  overflow: hidden;
  background: #e6e1d5 center/cover no-repeat;
  border: 6px solid var(--ring);
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}

.nameTag {
  margin-top: 20px;
  padding: 10px 24px;
  border-radius: 999px;
  background: var(--pill);
  color: #fff;
  border: 3px solid var(--ink);
  font-family: 'Nunito';
  font-weight: 800;
  box-shadow: 0 6px 0 rgba(0,0,0,0.05);
}

/* 🎇 Floating calm sparkles - NO HEARTS */
.sparkle {
  position: fixed;
  pointer-events: none;
  font-size: 26px;
  opacity: 0;
  text-shadow: 0 0 10px #fff6, 0 0 18px #fff;
  z-index: 1
}

/* 🚪 Front Door: Password Screen */
.gate {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  z-index: 20
}

.gateInner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px
}

.envelopeWrap {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.envelopeImg {
  width: 180px;
  height: 180px;
  border-radius: 24px;
  overflow: hidden;
  background: var(--pill) center/cover no-repeat;
  border: 4px solid var(--ink);
  box-shadow: 0 12px 0 rgba(0,0,0,0.04);
  display: flex;
  align-items: center;
  justify-content: center;
}

.bob { animation: bob 2.2s ease-in-out infinite }
@keyframes bob {
  0%, 100% { transform: translateY(0) }
  50% { transform: translateY(6px) }
}

.typeLabel {
  font-family: 'Baloo 2', sans-serif;
  font-size: 26px;
  font-weight: 800;
  background: #fff;
  border: 3px solid var(--ink);
  padding: 12px 24px;
  border-radius: 16px;
  box-shadow: 0 8px 0 rgba(0,0,0,0.04);
  text-align: center;
  min-width: 280px;
}

.nameInput {
  padding: 14px;
  border-radius: 14px;
  border: 3px solid var(--ink);
  font-family: 'Nunito';
  font-weight: 800;
  text-align: center;
  font-size: 16px;
  width: min(320px, 85vw);
  background: #fff;
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
}
</style>
</head>
<body>

<div class="grid"></div>

<div class="gate" id="gate">
  <div class="gateInner">
    <div class="envelopeWrap bob">
      <div class="envelopeImg">
         <img src="envelope.jpg" alt="Letter Envelope" style="width:100%; height:100%; object-fit:cover;" onerror="this.style.display='none'; this.parentNode.innerHTML='<span style=\'font-size:70px;\'>✉️</span>';">
      </div>
    </div>

    <div class="typeLabel" id="typeLabel"></div>
    <input class="nameInput" id="nameInput" type="password" placeholder="Type password here..." autocomplete="off" />
  </div>
</div>

<div class="wrap">
  <div class="stage" id="scene" style="display:none;">
    
    <div class="left-letter">
      <h2 id="typeTitle"></h2>
      <p id="typeBody"></p>
    </div>
    
    <div class="right-picture">
      <div class="avatar">
        <img src="bestie.png" alt="Amulya" style="width:100%;height:100%;object-fit:cover" onerror="this.src='https://placehold.co/360x360/84937c/ffffff?text=%F0%9F%A4%9D'">
      </div>
      <div class="nameTag">Amulya 🦋</div>
    </div>

  </div>
</div>

<div id="sparkLayer"></div>

<audio id="bgm" src="sorry-song.mp3" loop></audio>

<script>
const CONFIG = {
  unlockWord: "sorry", // 🔐 Change this to the password you want her to type
  
  staticTitle: "🦋 For my sister / friend... I miss you deeply. 🦋",
  staticBody:
`I am writing this because finding the right words out loud has been hard, but I couldn't let another day pass without trying to fix what I broke.

I want to say I am incredibly, truly sorry for hurting you. Looking back at how things went down, I realize how much my actions cut deep, and it kills me to know that I am the reason there is silence between us now.

Our friendship means the world to me. You have been my safe space, my partner in crime, and a piece of my life I never want to lose.

I don't expect everything to go back to normal instantly, and I entirely respect your space. But I wanted to make this to show you that I am completely accountable, I miss you terribly, and whenever you are ready... I'll be right here waiting to listen. 🌸`,

  sparklesPerSecond: 18, 
  // 🦋 UPDATED: Added butterflies, ribbons, cherry blossoms, and classic sparkles
  sparkSet: ["🦋", "✨", "🌸", "🌟", "🎀", "⭐", "☀️", "🌱"] 
};

/* ===== Typewriter Function ===== */
function typewrite(el, text, speed=28, done){ 
  el.textContent=''; let i=0;
  const t=setInterval(()=>{ el.textContent+= text[i++] || ''; if(i>text.length){clearInterval(t); done&&done();}}, speed);
}

/* ===== High-Density Sparkle Engine ===== */
const sparkLayer = document.getElementById('sparkLayer');
function sparkle(){
  const s=document.createElement('div'); s.className='sparkle';
  s.textContent=CONFIG.sparkSet[Math.floor(Math.random()*CONFIG.sparkSet.length)];
  s.style.left=Math.random()*innerWidth+'px';
  s.style.top=Math.random()*innerHeight+'px';
  s.style.transform=`scale(${0.6+Math.random()*1.3}) rotate(${Math.random()*40-20}deg)`;
  sparkLayer.appendChild(s);
  requestAnimationFrame(()=> s.style.transition='opacity .16s ease');
  s.style.opacity=1;
  setTimeout(()=> s.style.opacity=0, 360+Math.random()*520);
  setTimeout(()=> s.remove(), 1200);
}
setInterval(sparkle, 1000/CONFIG.sparklesPerSecond);

/* ===== Initial Load Action ===== */
window.addEventListener('DOMContentLoaded', () => {
  const typeLabel = document.getElementById('typeLabel');
  typewrite(typeLabel, "Hi Amulya... please enter your password.", 30);
});

/* ===== Password Gate Logic Handler ===== */
const gate = document.getElementById('gate');
const nameInput = document.getElementById('nameInput');
const bgm = document.getElementById('bgm');
const scene = document.getElementById('scene');
const typeTitle = document.getElementById('typeTitle'); 
const typeBody = document.getElementById('typeBody');

nameInput.addEventListener('keydown', (e)=>{
  if(e.key !== "Enter") return;
  const v = (nameInput.value || '').trim().toLowerCase();
  
  if(v === CONFIG.unlockWord.toLowerCase()){
    bgm.play().catch(err => console.log("Audio play gesture required"));
    
    gate.style.transition = "opacity .5s ease"; 
    gate.style.opacity = 0;
    
    setTimeout(()=>{ 
      gate.style.display = "none"; 
      scene.style.display = "grid"; 
      
      typewrite(typeTitle, CONFIG.staticTitle, 40, () => {
        typewrite(typeBody, CONFIG.staticBody, 22);
      });
    }, 500);
  } else {
    const typeLabel = document.getElementById('typeLabel');
    typewrite(typeLabel, "Please try again... I made this entirely for you.", 25);
    nameInput.value = ""; 
  }
});
</script>
</body>
</html>
