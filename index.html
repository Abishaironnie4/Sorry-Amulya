<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>For Amulya — Blooming Storybook</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;700;800&family=Special+Elite&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #eae3d2;       /* Warm vintage organic paper brown */
  --book-sheet: #fbf9f3;/* Elegant warm cotton journal sheet */
  --ink: #2d261d;      /* Deep sepia charcoal ink styling */
  --accent: #8b9a86;   /* Earthy sage leaf tone */
}

* {
  box-sizing: border-box;
}

html, body {
  height: 100%;
  margin: 0;
  background: var(--bg);
  font-family: 'Nunito', system-ui;
  color: var(--ink);
  overflow: hidden;
}

.grid {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(to right, rgba(45,38,29,0.03) 1px, transparent 1px) 0 0/30px 30px,
              linear-gradient(to bottom, rgba(45,38,29,0.03) 1px, transparent 1px) 0 0/30px 30px;
  z-index: 0;
}

.wrap {
  position: relative;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}

/* 📖 Main Layout - Two page open notebook book block */
.stage {
  position: relative;
  width: min(1150px, 94vw);
  height: min(620px, 85vh);
  display: grid;
  grid-template-columns: 1.15fr 0.85fr;
  gap: 0;
  background: var(--book-sheet);
  border: 2px solid #c9beaa;
  border-radius: 6px;
  box-shadow: 0 15px 45px rgba(45, 38, 29, 0.15), 
              inset 30px 0 50px rgba(0,0,0,0.02),
              inset -30px 0 50px rgba(0,0,0,0.02);
  padding: 50px;
}

/* Vintage center-spine book fold partition split crease */
.stage::after {
  content: '';
  position: absolute;
  left: 57.5%;
  top: 0;
  bottom: 0;
  width: 1px;
  background: linear-gradient(rgba(0,0,0,0) 0%, rgba(0,0,0,0.08) 20%, rgba(0,0,0,0.08) 80%, rgba(0,0,0,0) 100%);
  box-shadow: 0 0 10px rgba(0,0,0,0.05);
}

.left-letter {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 16px;
  overflow: hidden;
  padding-right: 40px;
}

.left-letter h2 {
  margin: 0;
  font-family: 'Special Elite', cursive; /* Typewriter font accent */
  font-size: clamp(22px, 3vw, 30px);
  color: #4a3e31;
  line-height: 1.3;
}

.left-letter p {
  margin: 0;
  font-family: 'Special Elite', cursive;
  font-size: clamp(14px, 1.8vw, 16px);
  line-height: 1.8;
  white-space: pre-wrap;
  overflow-y: auto;
  padding-right: 15px;
  color: #3b3227;
}

.right-picture {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-left: 40px;
}

/* 🖼️ Polaroid Craft Frame Concept styling structure */
.polaroid {
  background: #fff;
  padding: 16px 16px 36px 16px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  transform: rotate(3deg);
  position: relative;
  width: min(300px, 100%);
  border: 1px solid #eee;
}

/* Washi tape mockup graphic overlay decorations */
.polaroid::before {
  content: '';
  position: absolute;
  top: -18px;
  left: 35%;
  width: 90px;
  height: 25px;
  background: rgba(218, 211, 191, 0.6);
  backdrop-filter: blur(1px);
  transform: rotate(-4deg);
  border-left: 2px dashed rgba(0,0,0,0.05);
  border-right: 2px dashed rgba(0,0,0,0.05);
}

.avatar {
  width: 100%;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  background: #f0ede6;
  border: 1px solid #e2ded5;
}

.nameTag {
  margin-top: 15px;
  font-family: 'Special Elite', cursive;
  font-size: 18px;
  text-align: center;
  color: #554a3c;
}

.sparkle {
  position: fixed;
  pointer-events: none;
  font-size: 26px;
  opacity: 0;
  z-index: 1;
}

/* 🚪 front gate logic block styles */
.gate {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  z-index: 20;
}

.gateInner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

.bookIcon {
  font-size: 70px;
  filter: drop-shadow(0 10px 15px rgba(0,0,0,0.06));
}

.bob { animation: bob 2.2s ease-in-out infinite; }
@keyframes bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(6px); }
}

.typeLabel {
  font-family: 'Special Elite', sans-serif;
  font-size: 22px;
  color: var(--ink);
  text-align: center;
  max-width: 400px;
}

.nameInput {
  padding: 12px 15px;
  border-radius: 4px;
  border: 2px solid #bdae93;
  font-family: 'Special Elite';
  text-align: center;
  font-size: 16px;
  width: min(320px, 85vw);
  background: #fdfbf7;
  color: var(--ink);
  outline: none;
}
</style>
</head>
<body>

<div class="grid"></div>

<!-- 🚪 FRONT DIALOG LAYER PASS GATEWAY -->
<div class="gate" id="gate">
  <div class="gateInner">
    <div class="bookIcon bob">📖</div>
    <div class="typeLabel" id="typeLabel"></div>
    <input class="nameInput" id="nameInput" type="password" placeholder="Type password here..." autocomplete="off" />
  </div>
</div>

<!-- 💻 MAIN GRAPHIC JOURNAL INNER CONTENT LAYOUT LAYER -->
<div class="wrap">
  <div class="stage" id="scene" style="display:none;">
    
    <div class="left-letter">
      <h2 id="typeTitle"></h2>
      <p id="typeBody"></p>
    </div>
    
    <div class="right-picture">
      <div class="polaroid">
        <div class="avatar">
          <img src="bestie.png" alt="Amulya" style="width:100%;height:100%;object-fit:cover" onerror="this.src='https://placehold.co/360x360/f0ede6/2d261d?text=%F0%9F%A6%8B'">
        </div>
        <div class="nameTag">Amulya 🌸</div>
      </div>
    </div>

  </div>
</div>

<div id="sparkLayer"></div>

<audio id="bgm" src="sorry-song.mp3" loop></audio>

<script>
const CONFIG = {
  unlockWord: "sorry", 
  
  staticTitle: "Dear Amulya...",
  staticBody:
`I am writing this because finding the right words out loud has been hard, but I couldn't let another day pass without trying to fix what I broke.

I want to say I am incredibly, truly sorry for hurting you. Looking back at how things went down, I realize how much my actions cut deep, and it kills me to know that I am the reason there is silence between us now.

Our friendship means the world to me. You have been my safe space, my partner in crime, and a piece of my life I never want to lose.

I don't expect everything to go back to normal instantly, and I entirely respect your space. But I wanted to make this to show you that I am completely accountable, I miss you terribly, and whenever you are ready... I'll be right here waiting to listen.`,

  sparklesPerSecond: 12, 
  sparkSet: ["🦋", "✨", "🌸", "🌟", "🎀", "⭐", "☀️", "🌱"] 
};

function typewrite(el, text, speed=35, done){ // Slightly slower type rate for typewriter aesthetic profile match
  el.textContent=''; let i=0;
  const t=setInterval(()=>{ el.textContent+= text[i++] || ''; if(i>text.length){clearInterval(t); done&&done();}}, speed);
}

const sparkLayer = document.getElementById('sparkLayer');
function sparkle(){
  const s=document.createElement('div'); s.className='sparkle';
  s.textContent=CONFIG.sparkSet[Math.floor(Math.random()*CONFIG.sparkSet.length)];
  s.style.left=Math.random()*innerWidth+'px';
  s.style.top=Math.random()*innerHeight+'px';
  s.style.transform=`scale(${0.6+Math.random()*1.2}) rotate(${Math.random()*30-15}deg)`;
  sparkLayer.appendChild(s);
  requestAnimationFrame(()=> s.style.transition='opacity .2s ease');
  s.style.opacity = 0.8;
  setTimeout(()=> s.style.opacity=0, 500+Math.random()*400);
  setTimeout(()=> s.remove(), 1300);
}
setInterval(sparkle, 1000/CONFIG.sparklesPerSecond);

window.addEventListener('DOMContentLoaded', () => {
  const typeLabel = document.getElementById('typeLabel');
  typewrite(typeLabel, "Hi Amulya... please enter your password.", 30);
});

const gate = document.getElementById('gate');
const nameInput = document.getElementById('nameInput');
const bgm = document.getElementById('bgm');
const scene = document.getElementById('scene');
const typeTitle = document.getElementById('typeTitle'); 
const typeBody = document.getElementById('typeBody');

nameInput.addEventListener('keydown', (e)=>{
  if(e.key !== "Enter") return;
  const v = (nameInput.value || '').trim().toLowerCase();
  
  if(v === CONFIG.unlockWord.toLowerCase()){
    bgm.play().catch(err => console.log("Audio required user token check active"));
    
    gate.style.transition = "opacity .5s ease"; 
    gate.style.opacity = 0;
    
    setTimeout(()=>{ 
      gate.style.display = "none"; 
      scene.style.display = "grid"; 
      
      typewrite(typeTitle, CONFIG.staticTitle, 45, () => {
        typewrite(typeBody, CONFIG.staticBody, 25);
      });
    }, 500);
  } else {
    const typeLabel = document.getElementById('typeLabel');
    typewrite(typeLabel, "Please try again... I made this entirely for you.", 25);
    nameInput.value = ""; 
  }
});
</script>
</body>
</html>
