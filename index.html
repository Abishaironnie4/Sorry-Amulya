<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>For Amulya</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #fbf6ee;         /* warm cream */
  --ink: #5a5145;        /* soft brown ink, not harsh black */
  --pill: #c98a9c;       /* dusty rose */
  --pill-d: #a86b7d;     /* deeper rose for shadow/accents */
  --ring: #6b5c4b;       /* soft brown border */
  --white: #fff;
  --paper-line: #ecdfd0;
}

* {
  box-sizing: border-box
}

html, body {
  height: 100%;
  margin: 0
}

body {
  background:
    radial-gradient(circle at 15% 20%, #ffe3ea 0%, transparent 40%),
    radial-gradient(circle at 85% 15%, #e3f0e0 0%, transparent 45%),
    radial-gradient(circle at 50% 95%, #fff2d9 0%, transparent 50%),
    var(--bg);
  font-family: 'Quicksand', system-ui;
  color: var(--ink);
  overflow: hidden
}

.wrap {
  position: relative;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center
}

/* 🌸 Layout - Main Apology split screen (watercolor paper feel) */
.stage {
  position: relative;
  width: min(1100px, 92vw);
  height: min(600px, 88vh);
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 40px;
  background: #fffaf3;
  border: 2px solid var(--pill-d);
  border-radius: 24px;
  padding: 40px;
  box-shadow: 0 2px 0 #fff, 0 5px 0 var(--paper-line), 0 20px 50px rgba(0,0,0,0.08);
  transform: rotate(-0.35deg);
}

/* Left Column: Letter Title & Body text typing container */
.left-letter {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 12px;
  overflow: hidden;
  position: relative;
}

.left-letter h2 {
  margin: 0;
  font-family: 'Great Vibes', cursive;
  font-weight: 400;
  font-size: clamp(30px, 4.2vw, 46px);
  color: var(--pill-d);
  line-height: 1.2;
  padding-right: 40px;
}

.left-letter p {
  margin: 0;
  font-size: clamp(15px, 2vw, 18px);
  font-weight: 600;
  line-height: 28px;
  white-space: pre-wrap;
  overflow-y: auto;
  padding-right: 10px;
  color: #4a4335;
  background-image: repeating-linear-gradient(to bottom, transparent, transparent 27px, var(--paper-line) 28px);
  background-position: 0 4px;
}

.signature {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(26px, 3.2vw, 34px);
  color: var(--pill-d);
  text-align: right;
  margin-top: 4px;
  opacity: 0;
  transition: opacity .8s ease;
}
.signature.show { opacity: 1; }

/* Replay button */
.replayBtn {
  position: absolute;
  top: 0;
  right: 0;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid var(--pill-d);
  color: var(--pill-d);
  display: grid;
  place-items: center;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 4px 0 rgba(0,0,0,0.05);
}

/* Right Column: photo gallery */
.right-picture {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

.avatarFrame {
  position: relative;
  width: min(320px, 100%);
}

.avatar {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 50%;
  overflow: hidden;
  background: #ecdfd0 center/cover no-repeat;
  border: 6px solid var(--pill);
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.nav-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.9);
  border: 2px solid var(--pill-d);
  color: var(--pill-d);
  border-radius: 50%;
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  font-size: 20px;
  font-weight: 900;
  cursor: pointer;
  z-index: 5;
  box-shadow: 0 4px 0 rgba(0,0,0,0.06);
  transition: transform .1s ease;
}
.nav-arrow:active { transform: translateY(-50%) scale(0.94); }
.nav-arrow:disabled { opacity: .35; cursor: default; }
#prevBtn { left: -14px; }
#nextBtn { right: -14px; }

.nameTag {
  margin-top: 20px;
  padding: 10px 24px;
  border-radius: 999px;
  background: var(--pill);
  color: #fff;
  border: 2px solid var(--pill-d);
  font-family: 'Quicksand';
  font-weight: 700;
  box-shadow: 0 6px 0 rgba(0,0,0,0.05);
}

/* 💫 Soft sparkle bursts — pop in, then fade away */
.sparkle {
  position: fixed;
  pointer-events: none;
  font-size: 22px;
  opacity: 0;
  text-shadow: 0 0 10px #fff8, 0 0 18px #fff;
  z-index: 1
}

/* 🚪 Front Door: Title card + password only */
.gate {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  z-index: 20
}

.gateInner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px
}

.titleCard {
  background: rgba(255,250,243,0.95);
  border-radius: 24px;
  padding: 44px 56px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.06);
  border: 1px solid rgba(168, 107, 125, 0.2);
}

.cardLabel {
  margin: 0;
  font-family: 'Quicksand', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #a89a86;
}

.cardTitle {
  margin: 6px 0 0;
  font-family: 'Great Vibes', cursive;
  font-weight: 400;
  font-size: clamp(40px, 6vw, 58px);
  color: var(--pill-d);
}

.cardIcons {
  margin-top: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  font-size: 24px;
}

.nameInput {
  padding: 14px;
  border-radius: 20px;
  border: 2px solid var(--pill-d);
  font-family: 'Quicksand';
  font-weight: 700;
  text-align: center;
  font-size: 16px;
  width: min(320px, 85vw);
  background: #fff;
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
  transition: border-color .2s ease;
}
.nameInput.wrong {
  border-color: #e0a6a6;
  animation: shake .4s ease;
}
@keyframes shake {
  0%, 100% { transform: translateX(0) }
  25% { transform: translateX(-6px) }
  75% { transform: translateX(6px) }
}

/* 📱 Mobile: stack the letter and photo instead of squeezing side by side */
@media (max-width: 700px) {
  .stage {
    grid-template-columns: 1fr;
    height: auto;
    max-height: 92vh;
    overflow-y: auto;
    padding: 26px 22px;
    gap: 22px;
    transform: none;
  }
  .right-picture { order: -1; }
  .avatarFrame { width: min(220px, 65vw); margin: 0 auto; }
  #prevBtn { left: -8px; }
  #nextBtn { right: -8px; }
}
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gateInner">
    <div class="titleCard">
      <p class="cardLabel">A Garden Letter</p>
      <h1 class="cardTitle">For Amulya</h1>
      <div class="cardIcons" id="cardIcons">🦋 🌸 👸 🌷</div>
    </div>

    <input class="nameInput" id="nameInput" type="password" placeholder="Type password here..." autocomplete="off" />
  </div>
</div>

<div class="wrap">
  <div class="stage" id="scene" style="display:none;">

    <div class="left-letter">
      <button class="replayBtn" id="replayBtn" title="Read again">↻</button>
      <h2 id="typeTitle"></h2>
      <p id="typeBody"></p>
      <p class="signature" id="signature">— with love, always</p>
    </div>

    <div class="right-picture">
      <div class="avatarFrame">
        <button class="nav-arrow" id="prevBtn">❮</button>
        <div class="avatar" id="avatar">
          <img id="avatarImg" src="" alt="Amulya" onerror="this.src='https://placehold.co/360x360/c98a9c/ffffff?text=%F0%9F%8C%B8'">
        </div>
        <button class="nav-arrow" id="nextBtn">❯</button>
      </div>
      <div class="nameTag">Amulya 👸</div>
    </div>

  </div>
</div>

<div id="sparkLayer"></div>

<audio id="bgm" src="sorry-song.mp3" loop></audio>

<script>
const CONFIG = {
  unlockWord: "Nidramabbuamalaya", 

  staticTitle: "🌸 For my sister / friend... I miss you deeply. 🌸",
  staticBody:
`I am writing this because finding the right words out loud has been hard, but I couldn't let another day pass without trying to fix what I broke.

I want to say I am incredibly, truly sorry for [WHAT I DID]. I know it hurt you, and I take full responsibility for it — not the situation, not a misunderstanding, just me.

Our friendship means the world to me. You have been my safe space, my partner in crime, and a piece of my life I never want to lose.

I don't expect everything to go back to normal instantly, and I entirely respect your space. But I wanted you to know I mean this, I miss you, and whenever you're ready... I'll be right here. 🌷`,

  galleryItems: [
    "bestie.png",
    "pic2.jpg",
    "pic3.jpg"
  ],

  sparklesPerSecond: 8,
  sparkSet: ["✨", "🦋", "👸", "🌟", "💫", "⭐", "🌸", "🌷", "👑", "🌼"]
};

/* ===== Typewriter Function ===== */
let activeTypers = new WeakMap();
function typewrite(el, text, speed=28, done){
  if (activeTypers.has(el)) clearInterval(activeTypers.get(el));
  el.textContent=''; let i=0;
  const t=setInterval(()=>{ el.textContent+= text[i++] || ''; if(i>text.length){clearInterval(t); activeTypers.delete(el); done&&done();}}, speed);
  activeTypers.set(el, t);
}

/* ===== Soft popping/falling sparkle bursts (Runs instantly on load) ===== */
const sparkLayer = document.getElementById('sparkLayer');
function sparkle(){
  const s=document.createElement('div'); s.className='sparkle';
  s.textContent=CONFIG.sparkSet[Math.floor(Math.random()*CONFIG.sparkSet.length)];
  s.style.left=Math.random()*innerWidth+'px';
  s.style.top=Math.random()*innerHeight+'px';
  s.style.transform=`scale(${0.6+Math.random()*1.3}) rotate(${Math.random()*40-20}deg)`;
  sparkLayer.appendChild(s);
  requestAnimationFrame(()=> s.style.transition='opacity .16s ease');
  s.style.opacity=1;
  setTimeout(()=> s.style.opacity=0, 400+Math.random()*600);
  setTimeout(()=> s.remove(), 1200);
}
// Start immediately on first page load
setInterval(sparkle, 1000/CONFIG.sparklesPerSecond);

/* ===== Photo Gallery ===== */
const avatarImg = document.getElementById('avatarImg');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
let currentSlide = 0;

function updateGallery(index){
  avatarImg.src = CONFIG.galleryItems[index];
  prevBtn.disabled = index === 0;
  nextBtn.disabled = index === CONFIG.galleryItems.length - 1;
}
prevBtn.addEventListener('click', ()=>{ if(currentSlide>0){ currentSlide--; updateGallery(currentSlide); } });
nextBtn.addEventListener('click', ()=>{ if(currentSlide<CONFIG.galleryItems.length-1){ currentSlide++; updateGallery(currentSlide); } });

/* ===== Letter sequence ===== */
const typeTitle = document.getElementById('typeTitle');
const typeBody = document.getElementById('typeBody');
const signature = document.getElementById('signature');

function playLetter(){
  signature.classList.remove('show');

  typewrite(typeTitle, CONFIG.staticTitle, 40, () => {
    typewrite(typeBody, CONFIG.staticBody, 22, () => {
      signature.classList.add('show');
    });
  });
}

document.getElementById('replayBtn').addEventListener('click', playLetter);

/* ===== Password Gate Logic Handler ===== */
const gate = document.getElementById('gate');
const nameInput = document.getElementById('nameInput');
const bgm = document.getElementById('bgm');
const scene = document.getElementById('scene');

nameInput.addEventListener('keydown', (e)=>{
  if(e.key !== "Enter") return;
  const v = (nameInput.value || '').trim().toLowerCase();

  if(v === CONFIG.unlockWord.toLowerCase()){
    nameInput.disabled = true;
    updateGallery(currentSlide);

    bgm.play().catch(err => console.log("Audio play gesture required"));

    gate.style.transition = "opacity .5s ease";
    gate.style.opacity = 0;

    setTimeout(()=>{
      gate.style.display = "none";
      scene.style.display = "grid";
      playLetter();
    }, 500);

  } else {
    nameInput.classList.remove('wrong');
    void nameInput.offsetWidth; 
    nameInput.classList.add('wrong');
    nameInput.value = "";
  }
});
</script>
</body>
</html>
